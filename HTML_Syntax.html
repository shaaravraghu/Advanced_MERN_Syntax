<!-- HTML: Structure/ Layout; CSS: Style; JavaScript: Logic -->
<!-- HTML: Hyper Text Markup Language; HTML is the code used for structuring webpage and it's content. Components used to design webpage are called HTML Tags. -->
<!-- Use the Live Server extension on VS Code. Type "!" and you will see a drop-down for emmet abbreviations (default code)-->

<!DOCTYPE html> <!--Tells browser you are using HTML5-->
<html lang="en"> <!--Root of a HTML file; and setting language to english-->
<head> <!--Container for metadata (data about data)-->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title> <!--Page title-->
</head>
<body> <!--Contains all data rendered by the browser-->
    
</body>
</html>

<!-- HTML Tags: Container for some content/ other HTML Tags-->
<!-- Paragraph Tags: <p> <-content-> </p>-->

<p>This is my paragraph content</p>

<!--You can click on any HTML Tags and get required MDN Reference-->
<!--We can use inspect element/ view page source to edit html-->
<!--HTML Attributes are used to add more information to the tag. It is generally added in the opening tag.-->
<!-- Use control+forward_slash to comment out the code. (shortcut) -->

<h1>Most Imortant Heading</h1>
<h2></h2>
<h3></h3>
<h4></h4>
<h5></h5>
<h6>Least Important Heading</h6>

<!-- These are the heading tags used in the body. -->
<!-- Anchor Tags: Display Links -->
<!-- It uses href to provide the click link as an attribute and content as display. -->

<a href="https://google.com">Google</a>
