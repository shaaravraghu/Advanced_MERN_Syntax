<!-- HTML5 introduced new tags to make webpages more structured, readable and meaningful -->

<!-- Structure Tags -->
<body>
  <header> <!-- Top part of webpage -->
    <h1>My Website</h1>
  </header>

  <nav> <!-- Navigation menu -->
    <a href="#">Home</a>
    <a href="#">About</a>
  </nav>

  <main> 
    <!-- -->
    <section> <!-- Logical grouping of content -->
      <h2>Welcome</h2>
      <p>This is my website.</p>
    </section>

    <article> <!-- Independent piece -->
      <h2>Blog Post</h2>
      <p>This is an article.</p>
    </article>

    <aside> <!-- Sidebar content -->
      <p>Sidebar info</p>
    </aside>
  </main>

  <footer> <!-- Bottom part of webpage -->
    <p>© 2025 MySite</p>
  </footer>
</body>

<!-- Media Tags -->
<audio controls>
  <source src="song.mp3" type="audio/mpeg">
</audio>
<video controls width="400">
  <source src="movie.mp4" type="video/mp4">
</video>

<!-- Form related HTML5 tags -->
<!-- New input types: email, date, number, range, color, url, tel, search -->

<!-- Few other tags -->
<!-- used for drawing shapes using JS -->
<canvas id="myCanvas" width="200" height="200"></canvas> 
<!-- used to display vector graphics -->
<svg width="200" height="100">
  <rect width="200" height="100" fill="blue" />
</svg>
<!-- used for collapsible content -->
<details>
  <summary>Read More</summary>
  <p>This is hidden content.</p>
</details>
<!-- used for images with captions -->
<figure>
  <img src="img.jpg" alt="image">
  <figcaption>This is an image caption.</figcaption>
</figure>


<!-- Semantic HTML: refers to using HTML tags that describe meaning, purpose, and structure of the content -->
<!-- Examples: <header>, <nav>, <section>, <article>, <footer>, <main>, <aside>, <time>, <mark> etc. -->
<!-- Non-semantic tags examples: <div>, <span>; just print data as it is -->


<!-- HTML Forms: used to collect input from users -->
<form action="/submit" method="POST">
  <label>Name:</label>
  <input type="text" name="username">
  
  <button type="submit">Submit</button>
</form>
<!-- 
<form> → container of the form 
action → URL where the data goes
method → HTTP method (GET or POST)
input → collects user data
button type="submit" → sends the form
-->
<!-- Input types -->
<input type="text" name="fullName">
<input type="email" name="email">
<input type="password" name="password">
<input type="number" name="age">
<input type="tel" name="phone">
<input type="date" name="dob">
<input type="file" name="resume">
<input type="color" name="favColor">
<input type="range" min="0" max="100">
<input type="checkbox" name="terms">
<input type="radio" name="gender" value="male">
<input type="radio" name="gender" value="female">
<!-- Multi-line input -->
<textarea name="message" rows="4" cols="30"></textarea>
<!-- Select dropdown -->
<select name="country">
  <option value="in">India</option>
  <option value="us">USA</option>
  <option value="uk">UK</option>
</select>
<!-- Labels -->
<label for="email">Email:</label>
<input id="email" type="email" name="email">
<!-- Required fields and pattern validation -->
<input type="email" name="email" required>
<input type="text" name="username" pattern="[A-Za-z]{3,}">
<!-- Forms with GET: visible in URL -->
<!-- Used for: search, filters, non-sensitive data -->
<form action="/search" method="GET">
  <input type="text" name="q">
  <button>Search</button>
</form>
<!-- Forms with POST: hidden data -->
<!-- Used for: Login, Signup, Payments, File uploads -->
<form action="/login" method="POST">
  <input type="email" name="email">
  <input type="password" name="password">
  <button>Login</button>
</form>
<!-- File upload form -->
<form action="/upload" method="POST" enctype="multipart/form-data">
  <input type="file" name="profilePic">
  <button>Upload</button>
</form>
<!-- Submit and Reset Buttons -->
<button type="submit">Submit</button>
<button type="reset">Clear</button>


<!-- HTML Media: Images, Audio, Video, Iframes (embeddings of other websites), Picture tag -->
<!-- 
src → image file path
alt → text shown if image doesn’t load (VERY IMPORTANT for accessibility + SEO)
width/height → size 
-->
<img src="image.jpg" alt="A beautiful scene" width="300">
<!--
controls → shows play/pause UI
autoplay → starts automatically
loop → repeats
muted → starts muted
-->
<audio controls>
    <source src="audio.mp3" type="audio/mp3">
    Your browser does not support the audio tag.
</audio>
<!-- 
controls
autoplay
muted
loop
poster="image.png" → thumbnail image
-->
<video width="400" controls>
    <source src="movie.mp4" type="video/mp4">
    Your browser does not support the video tag.
</video>
<!-- Website Embeddings -->
<!-- Youtube -->
<iframe
    width="560"
    height="315"
    src="https://www.youtube.com/embed/dQw4w9WgXcQ"
    title="YouTube video player"
    frameborder="0"
    allowfullscreen>
</iframe>
<!-- Google Maps -->
<iframe
    src="https://www.google.com/maps/embed?..."
    width="400"
    height="300"
    style="border:0;"
    loading="lazy">
</iframe>
<!-- Responsive Images -->
 <picture>
    <source srcset="image-large.webp" media="(min-width: 800px)">
    <source srcset="image-small.webp" media="(max-width: 799px)">
    <img src="fallback.png" alt="Responsive image">
</picture>


<!-- JSX (JavaScript XML): build UI inside JS (React) -->
<!-- looks like HTML, behaves like a templating language, intentionally similar syntax so that developers can write UI the same way they structure HTML -->
<!-- Key differences -->
<!-- Attribute Names (change becausee keywords in JS cannot be used): class → className; for → htmlFor -->
<!-- Requires one parent element (<> and </>) -->
<>
  <h1>Hello</h1>
  <p>World</p>
</>
<!-- Expressions inside {} -->
<h1>The sum is {10 + 20}</h1>
<!-- Inline styles use objects -->
<p style={{ color: "red", fontSize: "20px" }}>Hello</p>
<!-- Self closing tags must be explicit; requires '/' -->
<img src="photo.png" />
<!-- Only JS code (variables, function calls, math, conditionals, mapping arrays) is allowed inside {}. Tells JSX that {} is JS and evaluate it! HTML cannot be written inside. -->
